# agent-notes: { ctx: "minimal preset — clean sans-serif, spare decoration", deps: [ThemeDefinition.cs], state: active, last: "sato@2026-03-12" }
#
# Minimal preset for md2. Clean sans-serif design with spare decoration,
# no alternate row shading, thin borders. For documents where content
# should speak for itself.

meta:
  name: minimal
  description: Clean and spare — content-first with minimal decoration
  version: 1

typography:
  headingFont: "Helvetica Neue"
  bodyFont: "Helvetica Neue"
  monoFont: "SF Mono"
  monoFontFallback: "Cascadia Code"

colors:
  primary: "#111111"
  secondary: "#666666"
  bodyText: "#333333"
  codeBackground: "#F7F7F7"
  codeBorder: "#EEEEEE"
  link: "#111111"
  tableHeaderBackground: "#F0F0F0"
  tableHeaderForeground: "#111111"
  tableBorder: "#E0E0E0"
  tableAlternateRow: "#FAFAFA"
  blockquoteBorder: "#CCCCCC"
  blockquoteText: "#666666"

docx:
  baseFontSize: 11
  heading1Size: 24
  heading2Size: 18
  heading3Size: 14
  heading4Size: 12
  heading5Size: 11
  heading6Size: 11
  lineSpacing: 1.3
  tableBorderWidth: 2
  blockquoteIndentTwips: 480
  page:
    width: 11906
    height: 16838
    marginTop: 1440
    marginBottom: 1440
    marginLeft: 1440
    marginRight: 1440
