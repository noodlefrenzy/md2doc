# agent-notes: { ctx: "academic preset — journal-style, serif, double-spaced", deps: [ThemeDefinition.cs], state: active, last: "sato@2026-03-12" }
#
# Academic preset for md2. Journal-style formatting with serif body,
# double line spacing, US Letter size, and traditional heading hierarchy.

meta:
  name: academic
  description: Journal-style for papers, theses, and research documents
  version: 1

typography:
  headingFont: "Times New Roman"
  bodyFont: "Times New Roman"
  monoFont: "Courier New"
  monoFontFallback: Consolas

colors:
  primary: "#000000"
  secondary: "#444444"
  bodyText: "#000000"
  codeBackground: "#F5F5F5"
  codeBorder: "#DDDDDD"
  link: "#000080"
  tableHeaderBackground: "#333333"
  tableHeaderForeground: "#FFFFFF"
  tableBorder: "#000000"
  tableAlternateRow: "#F9F9F9"
  blockquoteBorder: "#666666"
  blockquoteText: "#333333"

docx:
  baseFontSize: 12
  heading1Size: 16
  heading2Size: 14
  heading3Size: 13
  heading4Size: 12
  heading5Size: 12
  heading6Size: 12
  lineSpacing: 2.0
  tableBorderWidth: 4
  blockquoteIndentTwips: 720
  page:
    width: 12240
    height: 15840
    marginTop: 1440
    marginBottom: 1440
    marginLeft: 1440
    marginRight: 1440
