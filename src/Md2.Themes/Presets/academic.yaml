# agent-notes: { ctx: "academic preset — journal-style, serif, double-spaced", deps: [ThemeDefinition.cs], state: active, last: "sato@2026-03-12" }
#
# Academic preset for md2. Journal-style formatting with serif body,
# double line spacing, US Letter size, and traditional heading hierarchy.

meta:
  name: academic
  description: Journal-style for papers, theses, and research documents
  version: 1

typography:
  headingFont: "Times New Roman"
  bodyFont: "Times New Roman"
  monoFont: "Courier New"
  monoFontFallback: Consolas

colors:
  primary: "#000000"
  secondary: "#444444"
  bodyText: "#000000"
  codeBackground: "#F5F5F5"
  codeBorder: "#DDDDDD"
  link: "#000080"
  tableHeaderBackground: "#333333"
  tableHeaderForeground: "#FFFFFF"
  tableBorder: "#000000"
  tableAlternateRow: "#F9F9F9"
  blockquoteBorder: "#666666"
  blockquoteText: "#333333"

docx:
  baseFontSize: 12
  heading1Size: 16
  heading2Size: 14
  heading3Size: 13
  heading4Size: 12
  heading5Size: 12
  heading6Size: 12
  lineSpacing: 2.0
  tableBorderWidth: 4
  blockquoteIndentTwips: 720
  page:
    width: 12240
    height: 15840
    marginTop: 1440
    marginBottom: 1440
    marginLeft: 1440
    marginRight: 1440

pptx:
  slideSize: "4:3"
  baseFontSize: 24
  heading1Size: 40
  heading2Size: 32
  heading3Size: 26
  background:
    color: "FFFFFF"
  titleSlide:
    titleSize: 48
    subtitleSize: 26
    backgroundColor: "333333"
  sectionDivider:
    titleSize: 40
    backgroundColor: "333333"
  content:
    titleSize: 32
    bodySize: 24
    bulletIndent: 36
  twoColumn:
    gutter: 48
  codeBlock:
    fontSize: 14
    padding: 12
    borderRadius: 4
  chartPalette:
    - "000000"
    - "444444"
    - "000080"
    - "666666"
    - "333333"
    - "888888"
