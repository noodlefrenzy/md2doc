# agent-notes: { ctx: "bubble preset — late-80s Japan bubble era, neon/geometric, city pop maximalism", deps: [ThemeDefinition.cs], state: active, last: "dani@2026-03-13" }
#
# Bubble preset for md2. Inspired by Japan's economic bubble era
# (1986-1991): the visual language of city pop album art, neon-lit
# Shibuya signage, and bold corporate confidence. Hot magenta primary,
# electric blue secondary, chunky geometric headings (Franklin Gothic),
# clean sans body (Verdana). Oversized H1s, generous spacing, A4 page.
# Bright, optimistic, slightly maximalist — money was never going to stop.

meta:
  name: bubble
  description: Bubble-era Japan — neon magenta, electric blue, geometric boldness, city pop maximalism
  version: 1

typography:
  headingFont: "Franklin Gothic Medium"
  bodyFont: Verdana
  monoFont: "Cascadia Code"
  monoFontFallback: Consolas

colors:
  primary: "#E6007E"
  secondary: "#00B4D8"
  bodyText: "#1A1A2E"
  codeBackground: "#F0E6F6"
  codeBorder: "#D4A5E0"
  link: "#00B4D8"
  tableHeaderBackground: "#E6007E"
  tableHeaderForeground: "#FFFFFF"
  tableBorder: "#D4A5E0"
  tableAlternateRow: "#FFF0F5"
  blockquoteBorder: "#FFB800"
  blockquoteText: "#4A1942"

docx:
  baseFontSize: 11
  heading1Size: 36
  heading2Size: 26
  heading3Size: 18
  heading4Size: 14
  heading5Size: 11
  heading6Size: 11
  lineSpacing: 1.4
  tableBorderWidth: 4
  blockquoteIndentTwips: 720
  page:
    width: 11906
    height: 16838
    marginTop: 1440
    marginBottom: 1440
    marginLeft: 1800
    marginRight: 1800

pptx:
  slideSize: "16:9"
  baseFontSize: 26
  heading1Size: 52
  heading2Size: 40
  heading3Size: 30
  background:
    color: "FFFFFF"
  titleSlide:
    titleSize: 60
    subtitleSize: 30
    backgroundColor: "E6007E"
  sectionDivider:
    titleSize: 48
    backgroundColor: "1A1A2E"
  content:
    titleSize: 40
    bodySize: 26
    bulletIndent: 40
  twoColumn:
    gutter: 56
  codeBlock:
    fontSize: 14
    padding: 14
    borderRadius: 12
  chartPalette:
    - "E6007E"
    - "00B4D8"
    - "FFB800"
    - "4A1942"
    - "FF69B4"
    - "00CED1"
