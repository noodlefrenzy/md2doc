# agent-notes: { ctx: "nightowl preset — dark academia, deep teal + amber, Palatino/Century Gothic", deps: [ThemeDefinition.cs], state: active, last: "dani@2026-03-13" }
#
# Night Owl preset for md2. Dark academia aesthetic: deep teal primary,
# warm amber accents, ivory-toned backgrounds, old-world serif body
# (Palatino) paired with geometric sans headings (Century Gothic).
# For people who want their docs to feel like a well-lit library.

meta:
  name: nightowl
  description: Dark academia — deep teal, amber accents, Palatino body with geometric headings
  version: 1

typography:
  headingFont: "Century Gothic"
  bodyFont: Palatino
  monoFont: "Cascadia Code"
  monoFontFallback: Consolas

colors:
  primary: "#1A4B4B"
  secondary: "#D4920B"
  bodyText: "#2C2416"
  codeBackground: "#F5F0E8"
  codeBorder: "#D6CCBA"
  link: "#B37A00"
  tableHeaderBackground: "#1A4B4B"
  tableHeaderForeground: "#F5EDD6"
  tableBorder: "#A89880"
  tableAlternateRow: "#FAF6EE"
  blockquoteBorder: "#D4920B"
  blockquoteText: "#5C4F3A"

docx:
  baseFontSize: 11.5
  heading1Size: 30
  heading2Size: 22
  heading3Size: 16
  heading4Size: 13
  heading5Size: 11.5
  heading6Size: 11.5
  lineSpacing: 1.35
  tableBorderWidth: 4
  blockquoteIndentTwips: 720
  page:
    width: 12240
    height: 15840
    marginTop: 1440
    marginBottom: 1440
    marginLeft: 1800
    marginRight: 1800

pptx:
  slideSize: "16:9"
  baseFontSize: 24
  heading1Size: 44
  heading2Size: 34
  heading3Size: 28
  colors:
    bodyText: "F5EDD6"
  background:
    color: "1A2F2F"
  titleSlide:
    titleSize: 54
    subtitleSize: 28
    backgroundColor: "1A4B4B"
  sectionDivider:
    titleSize: 44
    backgroundColor: "1A4B4B"
  content:
    titleSize: 36
    bodySize: 24
    bulletIndent: 36
  twoColumn:
    gutter: 48
  codeBlock:
    fontSize: 14
    padding: 12
    borderRadius: 8
  chartPalette:
    - "1A4B4B"
    - "D4920B"
    - "4A8B8B"
    - "B37A00"
    - "6B4D3A"
    - "8B6B5B"
